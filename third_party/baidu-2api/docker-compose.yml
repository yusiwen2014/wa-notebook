services:
  baidu2api:
    image: ghcr.io/dijiaozhibei-top/baidu2api:latest
    build: .
    container_name: baidu2api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - BAIDU2API_ADMIN_KEY=${BAIDU2API_ADMIN_KEY:-}
    volumes:
      - ./config.json:/app/config.json
