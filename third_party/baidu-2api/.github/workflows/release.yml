name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-amd64
            ext: .exe
          - os: windows-11-arm
            target: windows-arm64
            ext: .exe
          - os: ubuntu-latest
            target: linux-amd64
            ext: ''
          - os: ubuntu-24.04-arm
            target: linux-arm64
            ext: ''
          - os: macos-latest
            target: macos-arm64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name baidu2api main.py

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "dist\baidu2api${{ matrix.ext }}"
          $finalName = "baidu2api-${{ matrix.target }}${{ matrix.ext }}"
          Copy-Item $bin $finalName
          $zipDir = "baidu2api-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $zipDir
          Copy-Item $finalName $zipDir
          Compress-Archive -Path $zipDir -DestinationPath "baidu2api-${{ matrix.target }}.zip"

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/baidu2api
          cp dist/baidu2api "baidu2api-${{ matrix.target }}"
          mkdir -p "baidu2api-${{ matrix.target }}-dir"
          cp "baidu2api-${{ matrix.target }}" "baidu2api-${{ matrix.target }}-dir/"
          cd "baidu2api-${{ matrix.target }}-dir" && zip "../baidu2api-${{ matrix.target }}.zip" "baidu2api-${{ matrix.target }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: baidu2api-${{ matrix.target }}-bin
          path: baidu2api-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: baidu2api-${{ matrix.target }}-zip
          path: baidu2api-${{ matrix.target }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.1.0' }}
          name: Release ${{ github.ref_name || 'v1.1.0' }}
          body: |
            ## Baidu2API Release

            将 chat.baidu.com 的 AI 对话能力封装为 OpenAI 兼容 API。

            ### 下载

            | 文件 | 平台 |
            |------|------|
            | `baidu2api-windows-amd64.exe` / `.zip` | Windows x64 |
            | `baidu2api-windows-arm64.exe` / `.zip` | Windows ARM64 |
            | `baidu2api-linux-amd64` / `.zip` | Linux x64 |
            | `baidu2api-linux-arm64` / `.zip` | Linux ARM64 |
            | `baidu2api-macos-arm64` / `.zip` | macOS Apple Silicon |

            每个平台提供两种下载方式：独立二进制文件和 ZIP 压缩包。

            ### 使用

            ```bash
            # Linux/macOS
            chmod +x baidu2api-linux-amd64
            ./baidu2api-linux-amd64

            # Windows
            baidu2api-windows-amd64.exe

            # Debug mode
            ./baidu2api-linux-amd64 debug
            ```
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
