<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA错题本 - 智能错题管理平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>WA错题本</h1>
            <p class="subtitle">面向 OI/ACM 竞赛选手的智能错题管理平台</p>
        </header>

        <main>
            <section class="submit-section">
                <h2>提交新错题</h2>

                <div class="form-group">
                    <label for="platform">OJ 平台</label>
                    <select id="platform">
                        <option value="codeforces">Codeforces</option>
                        <option value="luogu">洛谷</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="url">提交链接</label>
                    <input type="text" id="url" placeholder="https://codeforces.com/contest/xxx/submission/xxx">
                    <p class="input-hint">支持自动抓取 Codeforces / 洛谷提交记录</p>
                </div>

                <div class="form-group toggle-group">
                    <button type="button" id="toggleManualBtn" class="btn-link">+ 无法自动抓取？手动粘贴代码</button>
                </div>

                <div id="manualInput" class="manual-input" style="display: none;">
                    <div class="form-group">
                        <label for="problemName">题目名称</label>
                        <input type="text" id="problemName" placeholder="例如：A+B Problem">
                    </div>
                    <div class="form-group">
                        <label for="codeInput">代码</label>
                        <textarea id="codeInput" rows="10" placeholder="在此处粘贴你的代码..."></textarea>
                    </div>
                </div>

                <button id="submitBtn" class="btn-primary">开始分析</button>
                <div id="result" class="result-box" style="display: none;"></div>
            </section>

            <section class="list-section">
                <div class="section-header">
                    <h2>错题列表</h2>
                    <span id="mistakeCount" class="count-badge">0</span>
                </div>
                <div id="mistakeList" class="mistake-list">加载中...</div>
            </section>
        </main>

        <footer>
            <p>WA错题本 v0.0.1 | TRAE AI 创造力大赛 2026</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
