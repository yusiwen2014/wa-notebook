<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA错题本 - 智能错题管理平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📘 WA错题本</h1>
            <p class="subtitle">面向 OI/ACM 竞赛选手的智能错题管理平台</p>
        </header>

        <main>
            <section class="submit-section">
                <h2>提交新错题</h2>
                <div class="form-group">
                    <label for="platform">OJ 平台</label>
                    <select id="platform">
                        <option value="codeforces">Codeforces</option>
                        <option value="luogu">洛谷</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="url">提交链接</label>
                    <input type="text" id="url" placeholder="https://codeforces.com/contest/xxx/submission/xxx">
                </div>
                <button id="submitBtn" class="btn-primary">开始分析</button>
                <div id="result" class="result-box" style="display: none;"></div>
            </section>

            <section class="list-section">
                <h2>错题列表</h2>
                <div id="mistakeList">加载中...</div>
            </section>
        </main>

        <footer>
            <p>WA错题本 v0.0.1 | TRAE AI 创造力大赛 2026</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
