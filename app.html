/* === USERDATA SYNC === */
const USERDATA_FILES = ['conversations.json', 'profile.json', 'custom_models.json', 'settings.json'];

function loadUserdataPath() {
  const el = document.getElementById('userdataPath');
  if (!el) return;
  fetch('/api/userdata/problems').then(r => r.json()).then(d => {
    if (d && d.dir) el.textContent = d.dir;
  }).catch(() => { el.textContent = '后端未连接'; });
}

async function fetchUserdata(name) {
  try {
    const r = await fetch('/api/userdata/' + name);
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function putUserdata(name, data) {
  try {
    const r = await fetch('/api/userdata/' + name, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    return r.ok;
  } catch (e) { return false; }
}

async function syncUserdataNow() {
  toast('同步中…', 'info');
  const ok1 = await putUserdata('conversations.json', {items: loadConversations()});
  const profile = {
    username: localStorage.getItem('wa-username') || 'OIer_wa',
    theme: state.theme,
    activeConvId,
  };
  const ok2 = await putUserdata('profile.json', profile);
  const settings = state.settings;
  settings._sidebarCollapsed = localStorage.getItem('wa-sidebar-collapsed') === '1';
  const ok3 = await putUserdata('settings.json', settings);
  // 自建模型
  const customModels = (state.models || []).filter(m => m.custom);
  const ok4 = await putUserdata('custom_models.json', {items: customModels});
  if (ok1 && ok2 && ok3 && ok4) toast('已同步到 userdata/','ok');
  else toast('部分写入失败（看后端）','err');
}

async function restoreFromDisk() {
  if (!confirm('将用 userdata/ 下的文件覆盖当前 localStorage 数据。继续？')) return;
  toast('恢复中…', 'info');
  const convs = await fetchUserdata('conversations.json');
  if (convs && Array.isArray(convs.items)) {
    saveConversations(convs.items);
    state.messages = [];
    localStorage.setItem('wa-messages', '[]');
  }
  const profile = await fetchUserdata('profile.json');
  if (profile && profile.username) {
    localStorage.setItem('wa-username', profile.username);
    document.getElementById('userName').textContent = profile.username;
    document.getElementById('userAvatar').textContent = (profile.username[0] || 'U').toUpperCase();
  }
  if (profile && profile.theme && profile.theme !== state.theme) toggleTheme();
  if (profile && profile.activeConvId) setActiveConv(profile.activeConvId);
  const s = await fetchUserdata('settings.json');
  if (s) {
    delete s._sidebarCollapsed;
    state.settings = s;
    localStorage.setItem('wa-settings', JSON.stringify(s));
  }
  renderHistory();
  showWelcome();
  toast('已从 userdata/ 恢复','ok');
}

async function exportAllToMarkdown() {
  toast('导出中…', 'info');
  const r = await fetch('/api/userdata/export-md', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({conversations: loadConversations()}),
  });
  const d = await r.json();
  if (d.ok) { toast(`已导出 ${d.files} 个文件到 ${d.dir}`,'ok'); refreshMdList(); }
  else toast('导出失败','err');
}

async function refreshMdList() {
  const el = document.getElementById('mdFileCount');
  if (!el) return;
  try {
    const r = await fetch('/api/userdata/problems');
    const d = await r.json();
    el.innerHTML = `共 <b>${d.items.length}</b> 个 .md 文件，路径：<code style="color:var(--accent-cyan);font-size:11.5px">${d.dir}</code>`;
  } catch (e) {
    el.textContent = '后端未连接';
  }
}

/* === MODAL & TOAST === */
function openModal() { document.getElementById('modalBg').classList.add('open'); }
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', (e) => { if (e.target.id === 'modalBg') closeModal(); });

function toast(msg, type='info') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const ic = type==='ok'?ICONS.ok:type==='err'?ICONS.err:ICONS.info;
  t.innerHTML = `<span class="ic">${ic}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(() => { t.classList.add('fadeout'); setTimeout(() => t.remove(), 200); }, 2400);
}

/* === GLOBAL === */
function bindGlobalEvents() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (state.isGenerating) { stopGeneration(); return; }
      document.getElementById('modelMenu').classList.remove('open');
      closeModal();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('globalSearch').focus();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === '/') {
      e.preventDefault();
      toggleTheme();
    }
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'o' || e.key === 'O')) {
      e.preventDefault();
      setView('models');
    }
  });
  document.getElementById('globalSearch').addEventListener('focus', () => { if (state.view !== 'wrong') setView('wrong'); });
  document.querySelectorAll('.history-item .del').forEach(d => {
    d.addEventListener('click', (e) => {
      e.stopPropagation();
      d.parentElement.remove();
      toast('已删除', 'ok');
    });
  });
}

init();
</script>
