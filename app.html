.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;height:100vh;background:var(--grad-bg);position:relative;transition:grid-template-columns .3s var(--ease-out)}
.app.collapsed{--sidebar-w:64px}
.app.collapsed .brand-name,.app.collapsed .brand-tag,.app.collapsed .nav-item span:not(.ic),.app.collapsed .nav-item .count,.app.collapsed .sb-section span,.app.collapsed .user-info,.app.collapsed .user-chev,.app.collapsed .history,.app.collapsed #userCard .user-info{display:none}
.app.collapsed .nav-item{justify-content:center;padding:9px 0}
.app.collapsed .sb-section{justify-content:center;padding:14px 0 6px}
.app.collapsed .sb-section .new-btn{display:none}
.app.collapsed .sb-footer{padding:10px 8px;justify-content:center}
.app.collapsed #userCard{justify-content:center;padding:8px 0}
.app.collapsed .user-card:hover .user-chev{transform:none}
.app.collapsed .topbar-actions,.app.collapsed .brand{min-width:auto;border:none;padding:0}
.ic-pin{font-size:14px;color:var(--text-secondary);line-height:1;display:grid;place-items:center}
.icon-btn:hover .ic-pin{color:var(--accent-cyan)}
.app::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 15%,rgba(0,229,255,.08),transparent 40%),radial-gradient(circle at 85% 85%,rgba(168,85,247,.08),transparent 40%);pointer-events:none;z-index:0}
html[data-theme="light"] .app::before{background:radial-gradient(circle at 15% 15%,rgba(0,229,255,.06),transparent 40%),radial-gradient(circle at 85% 85%,rgba(168,85,247,.06),transparent 40%)}
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 12px;gap:8px;background:var(--bg-elevated);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-subtle);z-index:10;position:relative;height:var(--topbar-h)}
.brand{display:flex;align-items:center;gap:10px;padding-right:14px;border-right:1px solid var(--border-subtle);flex-shrink:0;min-width:140px}
.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--grad-primary);display:grid;place-items:center;font-weight:900;color:#0a0a0f;font-size:14px;box-shadow:var(--shadow-glow);position:relative;overflow:hidden;flex-shrink:0}
.brand-mark::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.4),transparent 50%)}
.brand-name{font-weight:800;font-size:15px;letter-spacing:.3px}
.brand-name em{font-style:normal;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand-tag{font-size:10px;color:var(--text-muted);padding:2px 7px;border-radius:5px;background:var(--bg-hover);border:1px solid var(--border-subtle);font-weight:600}
.topbar-center{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.model-picker{position:relative;flex:0 0 180px;min-width:0;z-index:20}
.model-btn{width:100%;display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--radius-md);transition:all .2s var(--ease);height:34px}
.model-btn:hover{border-color:var(--border-strong);background:var(--bg-hover)}
.model-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green);flex-shrink:0}
.model-btn .label{flex:1;text-align:left;font-weight:500;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);z-index:1}
.model-btn .chev{color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.model-btn[aria-expanded="true"] .chev{transform:rotate(180deg)}
.search-input{flex:1;display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--radius-md);transition:all .2s var(--ease);min-width:60px}
.search-input:focus-within{border-color:var(--border-glow);background:var(--bg-card);box-shadow:0 0 0 3px rgba(0,229,255,.08)}
.search-input input{flex:1;background:transparent;font-size:12px;min-width:0}
.search-input svg{color:var(--text-muted);flex-shrink:0;width:14px;height:14px}
.topbar-actions{display:flex;align-items:center;gap:4px;justify-content:flex-end;padding-left:14px;border-left:1px solid var(--border-subtle);flex-shrink:0}
.icon-btn{width:36px;height:36px;display:grid;place-items:center;border-radius:9px;color:var(--text-secondary);transition:all .2s var(--ease)}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.icon-btn.active{background:var(--bg-active);color:var(--accent-cyan)}
.sidebar{background:var(--bg-elevated);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5}
.sb-section{padding:14px 12px 6px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between}
.sb-section .new-btn{width:22px;height:22px;display:grid;place-items:center;border-radius:5px;color:var(--text-muted);transition:all .2s}
.sb-section .new-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav{display:flex;flex-direction:column;gap:1px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--text-secondary);font-weight:500;font-size:13px;transition:all .15s var(--ease);position:relative;cursor:pointer;user-select:none}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--bg-active);color:var(--accent-cyan);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--accent-cyan);box-shadow:0 0 8px var(--accent-cyan)}
.nav-item .ic{width:18px;height:18px;flex-shrink:0}
.nav-item .count{margin-left:auto;background:var(--bg-hover);color:var(--text-muted);font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
.nav-item.active .count{background:var(--accent-cyan);color:var(--text-inverse)}
.history{flex:1;overflow-y:auto;padding:0 8px 14px}
.history-day{font-size:10px;color:var(--text-muted);padding:12px 10px 6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.history-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;color:var(--text-secondary);font-size:12.5px;cursor:pointer;transition:all .15s;margin-bottom:1px}
.history-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.history-item .title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .del{opacity:0;width:20px;height:20px;display:grid;place-items:center;border-radius:4px;color:var(--text-muted);font-size:14px}
.history-item:hover .del{opacity:1}
.history-item .del:hover{background:var(--accent-red);color:#fff}
.history-item.active{background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(168,85,247,.06));color:var(--accent-cyan);font-weight:600}
html[data-theme="light"] .history-item.active{background:linear-gradient(135deg,rgba(217,119,6,.12),rgba(124,58,237,.06));color:#b45309;font-weight:600}
.history-empty{padding:24px 12px;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.7}
.history-empty .em-ic{font-size:24px;margin-bottom:6px;opacity:.5}
.history-day{font-size:10.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:10px 10px 4px;opacity:.7}
.user-card{flex:1;display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:transparent;border:none;color:inherit;cursor:pointer;transition:all .2s var(--ease);text-align:left;width:100%;min-width:0}
.user-card:hover{background:var(--bg-hover)}
.user-card:hover .user-chev{transform:translateX(2px);color:var(--accent-cyan)}
.user-chev{color:var(--text-muted);transition:all .2s;flex-shrink:0}
.sb-footer{padding:10px 12px;border-top:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--grad-warm);display:grid;place-items:center;font-weight:700;color:#fff;font-size:12px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-plan{font-size:10.5px;color:var(--text-muted)}
.main{position:relative;overflow:hidden;z-index:1}
.view{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .3s var(--ease),transform .3s var(--ease-out);overflow:hidden}
.view.active{opacity:1;pointer-events:auto;transform:translateY(0)}
.chat{display:flex;flex-direction:column;height:100%}
.chat-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;overflow-y:auto}
.welcome-logo{width:64px;height:64px;border-radius:18px;background:var(--grad-primary);display:grid;place-items:center;font-weight:900;color:#0a0a0f;font-size:26px;margin-bottom:20px;box-shadow:0 0 40px rgba(0,229,255,.3);position:relative;overflow:hidden}
.welcome-logo::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.4),transparent 50%)}
.welcome-title{font-size:28px;font-weight:800;margin-bottom:8px;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.5px}
.welcome-sub{color:var(--text-secondary);margin-bottom:36px;font-size:14px;max-width:500px;line-height:1.7}
.suggest-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:680px}
.suggest-card{padding:14px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);cursor:pointer;transition:all .2s var(--ease);text-align:left;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.suggest-card:hover{border-color:var(--border-glow);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.suggest-card .ic{width:18px;height:18px;color:var(--accent-cyan);margin-bottom:8px}
.suggest-card .ti{font-weight:600;font-size:13px;margin-bottom:4px}
.suggest-card .de{font-size:12px;color:var(--text-muted);line-height:1.5}
.chat-stream{flex:1;overflow-y:auto;padding:24px 0;scroll-behavior:smooth}
.chat-inner{max-width:780px;margin:0 auto;padding:0 24px}
/* 问题关联胶囊 —— 显示在顶部搜索框旁边 */
.problem-pill{display:flex;align-items:center;gap:5px;padding:4px 5px 4px 9px;background:linear-gradient(135deg,rgba(0,229,255,.10),rgba(168,85,247,.10));border:1px solid var(--border-subtle);border-radius:8px;font-size:11.5px;white-space:nowrap;max-width:280px;min-width:0;flex:0 1 auto}
.problem-pill .pp-tag{padding:1.5px 6px;background:var(--grad-warm);color:#fff;border-radius:3px;font-weight:700;font-size:9.5px;letter-spacing:.3px;flex-shrink:0}
.problem-pill .pp-id{font-weight:600;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;min-width:0}
.problem-pill .pp-actions{display:flex;align-items:center;gap:1px;flex-shrink:0}
.problem-pill .pp-btn{padding:2px 6px;border-radius:4px;background:var(--grad-primary);color:#0a0a0f;font-weight:600;font-size:10px;border:none;cursor:pointer;transition:all .15s;line-height:1.2}
.problem-pill .pp-btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,229,255,.25)}
.problem-pill .pp-btn.ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-subtle)}
.problem-pill .pp-btn.ghost:hover{background:var(--bg-hover);color:var(--text-primary)}
.problem-pill .pp-link{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;background:transparent;color:var(--accent-cyan);text-decoration:none;font-size:12px;border:1px solid var(--border-subtle)}
.problem-pill .pp-link:hover{background:var(--bg-hover)}
.problem-pill .pp-code{color:var(--text-muted);font-size:10px;font-family:'JetBrains Mono',monospace;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1;min-width:0}
html[data-theme="light"] .problem-pill{background:linear-gradient(135deg,rgba(217,119,6,.08),rgba(124,58,237,.08))}
html[data-theme="light"] .problem-pill .pp-btn{color:#fff}
.msg{display:flex;gap:14px;margin-bottom:24px;animation:msgIn .3s var(--ease-out)}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0}
.msg.user .msg-avatar{background:var(--grad-cool);color:#fff}
.msg.ai .msg-avatar{background:var(--grad-primary);color:#0a0a0f;box-shadow:0 0 12px rgba(0,229,255,.3)}
.msg-body{flex:1;min-width:0;max-width:calc(100% - 50px)}
.msg-name{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.msg.user .msg-name{text-align:right}
.msg-content{font-size:14px;line-height:1.7;color:var(--text-primary);word-wrap:break-word;overflow-wrap:break-word}
.msg-content p{margin:.6em 0}
.msg-content p:first-child{margin-top:0}
.msg-content p:last-child{margin-bottom:0}
.msg-content h1,.msg-content h2,.msg-content h3{margin:1em 0 .5em;font-weight:700;line-height:1.3}
.msg-content h1{font-size:1.4em}
.msg-content h2{font-size:1.2em}
.msg-content h3{font-size:1.05em}
.msg-content ul,.msg-content ol{margin:.6em 0;padding-left:1.5em}
.msg-content li{margin:.25em 0}
.msg-content code{background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-size:.88em;border:1px solid var(--border-subtle)}
.msg-content pre{background:#0d1117;padding:14px 16px;border-radius:10px;overflow-x:auto;margin:.8em 0;border:1px solid var(--border-subtle)}
html[data-theme="light"] .msg-content pre{background:#f6f8fa}
.msg-content pre code{background:transparent;padding:0;border:none;font-size:.85em;display:block}
.msg-content blockquote{border-left:3px solid var(--accent-cyan);padding:6px 12px;margin:.8em 0;color:var(--text-secondary);background:var(--bg-hover);border-radius:0 6px 6px 0}
.msg-content a{color:var(--accent-cyan);text-decoration:underline;text-underline-offset:2px}
.msg-content table{border-collapse:collapse;margin:.8em 0;width:100%;font-size:.9em}
.msg-content th,.msg-content td{padding:6px 10px;border:1px solid var(--border-subtle);text-align:left}
.msg-content th{background:var(--bg-hover);font-weight:600}
.msg-content img{max-width:100%;border-radius:8px;margin:.5em 0}
.msg-meta{display:flex;align-items:center;gap:6px;margin-top:8px;opacity:0;transition:opacity .2s}
.msg:hover .msg-meta{opacity:1}
.msg-meta button{width:24px;height:24px;display:grid;place-items:center;border-radius:5px;color:var(--text-muted);transition:all .2s}
.msg-meta button:hover{background:var(--bg-hover);color:var(--text-primary)}
.msg-meta .model-tag{font-size:10.5px;color:var(--text-muted);padding:2px 7px;background:var(--bg-hover);border-radius:4px;border:1px solid var(--border-subtle);margin-left:auto}
.typing{display:inline-flex;align-items:center;gap:4px;padding:6px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent-cyan);animation:dot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.chat-composer{padding:14px 24px 18px;background:linear-gradient(180deg,transparent,var(--bg-primary) 30%)}
.composer-inner{max-width:780px;margin:0 auto}
.composer-box{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:18px;padding:6px 6px 6px 16px;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-md);transition:all .2s var(--ease);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.composer-box:focus-within{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1),var(--shadow-md)}
.composer-box .input-row{display:flex;align-items:flex-end;gap:6px}
.composer-box textarea{flex:1;background:transparent;border:none;outline:none;resize:none;padding:10px 4px;font-size:14px;line-height:1.5;color:var(--text-primary);min-height:24px;max-height:200px;font-family:inherit}
.composer-box textarea::placeholder{color:var(--text-muted)}
.composer-actions{display:flex;align-items:center;gap:6px;padding:0 4px 4px 0;flex-wrap:wrap}
.composer-tips{font-size:11px;color:var(--text-muted);padding:0 4px 4px;display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.send-btn{width:36px;height:36px;border-radius:50%;background:var(--grad-primary);color:#0a0a0f;display:grid;place-items:center;transition:all .2s var(--ease);flex-shrink:0;font-weight:700}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 16px rgba(0,229,255,.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn.stop{background:var(--accent-red);border:none;padding:0;animation:pulse 1.4s infinite}
.send-btn.stop .ic-stop{color:#0a0a0f}
.send-btn.stop:hover{box-shadow:0 0 16px rgba(239,68,68,.4)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.tool-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-secondary);transition:all .2s}
.tool-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.model-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-height:420px;overflow-y:auto;z-index:100;display:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.model-menu.open{display:block;animation:menuIn .15s var(--ease-out)}
@keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.mm-search{padding:10px;border-bottom:1px solid var(--border-subtle);position:sticky;top:0;background:var(--bg-elevated);z-index:1}
.mm-search input{width:100%;padding:7px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:7px;font-size:12.5px}
.mm-group{padding:6px}
.mm-group-title{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;display:flex;align-items:center;gap:6px}
.mm-group-title::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent-cyan)}
.mm-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:all .15s}
.mm-item:hover{background:var(--bg-hover)}
.mm-item.active{background:var(--bg-active)}
.mm-item .ic{width:16px;height:16px;color:var(--accent-cyan);flex-shrink:0}
.mm-item .info{flex:1;min-width:0}
.mm-item .name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mm-item .id{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.mm-item .check{color:var(--accent-cyan)}
/* 加载动画 - 三个跳动的点 */
.loading-dots{display:inline-flex;gap:4px;align-items:center;padding:8px 0}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);animation:bounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-0.32s}
.loading-dots span:nth-child(2){animation-delay:-0.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
.wrong-view,.profile-view,.models-view,.settings-view{padding:24px 32px;overflow-y:auto;flex:1}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.page-title .ic{width:32px;height:32px;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;color:transparent;display:grid;place-items:center;border-radius:9px;font-size:20px}
.page-sub{color:var(--text-muted);font-size:13px;margin-top:4px}
.btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:1px solid var(--border-subtle);background:var(--bg-card);color:var(--text-primary)}
.btn:hover{background:var(--bg-hover);border-color:var(--border-strong)}
.btn-primary{background:var(--grad-primary);color:#0a0a0f;border:none}
.btn-primary:hover{box-shadow:0 0 16px rgba(0,229,255,.3);transform:translateY(-1px)}
.btn-ghost{background:transparent}
.btn-danger{background:transparent;color:var(--accent-red);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.1);border-color:var(--accent-red)}
.btn-sm{padding:5px 10px;font-size:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .2s;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad-primary);opacity:.6}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-glow)}
.stat-label{font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.5px;line-height:1.2}
.stat-delta{font-size:11px;color:var(--accent-green);margin-top:4px;display:flex;align-items:center;gap:3px}
.wrong-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;color:var(--text-secondary);font-weight:500}
.filter-chip:hover{border-color:var(--border-strong);color:var(--text-primary)}
.filter-chip.active{background:var(--bg-active);color:var(--accent-cyan);border-color:var(--accent-cyan)}
.wrong-list{display:flex;flex-direction:column;gap:10px}
.wrong-item{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px;transition:all .2s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.wrong-item:hover{border-color:var(--border-glow);box-shadow:var(--shadow-md)}
.wrong-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.wrong-status{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:11px;flex-shrink:0}
.status-WA{background:rgba(239,68,68,.15);color:var(--accent-red);border:1px solid rgba(239,68,68,.3)}
.status-TLE{background:rgba(245,158,11,.15);color:var(--accent-orange);border:1px solid rgba(245,158,11,.3)}
.status-RE{background:rgba(168,85,247,.15);color:var(--accent-purple);border:1px solid rgba(168,85,247,.3)}
.status-MLE{background:rgba(236,72,153,.15);color:var(--accent-pink);border:1px solid rgba(236,72,153,.3)}
.status-CE{background:rgba(107,114,128,.15);color:var(--text-secondary);border:1px solid rgba(107,114,128,.3)}
.status-OLE{background:rgba(59,130,246,.15);color:var(--accent-blue);border:1px solid rgba(59,130,246,.3)}
.wrong-meta{flex:1;min-width:0}
.wrong-title{font-weight:700;font-size:14.5px;margin-bottom:3px;line-height:1.4}
.wrong-info{font-size:11.5px;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wrong-info .tag{padding:1px 6px;background:var(--bg-hover);border-radius:4px;font-weight:500}
.wrong-body{font-size:13px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6}
.wrong-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.wrong-tag{font-size:10.5px;padding:2px 7px;background:var(--bg-hover);border:1px solid var(--border-subtle);border-radius:5px;color:var(--text-secondary);font-weight:500}
.wrong-insight{background:linear-gradient(135deg,rgba(0,229,255,.05),rgba(168,85,247,.05));border:1px solid var(--border-glow);border-radius:10px;padding:10px 14px;font-size:12.5px;line-height:1.6;color:var(--text-primary);position:relative;margin-top:8px}
.wrong-insight::before{content:"";position:absolute;top:8px;left:-1px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--grad-primary)}
.wrong-insight b{color:var(--accent-cyan)}
.wrong-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.chart-row{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:24px}
.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-title .ic{width:18px;height:18px;color:var(--accent-cyan)}
.chart-box{position:relative;height:240px}
.knowledge-list{display:flex;flex-direction:column;gap:8px}
.k-item{display:flex;align-items:center;gap:12px;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:8px;transition:all .2s}
.k-item:hover{border-color:var(--border-strong)}
.k-name{font-size:12.5px;font-weight:600;min-width:110px}
.k-bar{flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden;position:relative;min-width:60px}
.k-bar-fill{position:absolute;top:0;left:0;bottom:0;border-radius:3px;background:var(--grad-primary);transition:width .8s var(--ease-out)}
.k-bar-fill.weak{background:linear-gradient(90deg,var(--accent-red),var(--accent-orange))}
.k-bar-fill.strong{background:linear-gradient(90deg,var(--accent-green),var(--accent-cyan))}
.k-pct{font-size:12px;font-weight:700;color:var(--accent-cyan);font-family:'JetBrains Mono',monospace;min-width:36px;text-align:right}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag-pill{font-size:12px;padding:4px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:14px;color:var(--text-secondary)}
.tag-pill.warn{background:rgba(245,158,11,.1);color:var(--accent-orange);border-color:rgba(245,158,11,.3)}
.models-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.models-desc{color:var(--text-muted);font-size:13px;margin-top:4px;max-width:600px;line-height:1.6}
.provider-group{margin-bottom:16px}
.provider-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px 12px 0 0;cursor:pointer;transition:all .2s}
.provider-head:hover{background:var(--bg-hover)}
.provider-info{display:flex;align-items:center;gap:12px}
.provider-logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.logo-baidu{background:linear-gradient(135deg,#2932e1,#4e6ef2)}
.logo-ddg{background:linear-gradient(135deg,#de5833,#f76d1c)}
.logo-test{background:linear-gradient(135deg,#6b7280,#9ca3af)}
.logo-custom{background:linear-gradient(135deg,#00e5ff,#a855f7)}
.provider-name{font-weight:700;font-size:14px}
.provider-meta{font-size:11.5px;color:var(--text-muted)}
.provider-actions{display:flex;align-items:center;gap:8px}
.provider-list{background:var(--bg-card);border:1px solid var(--border-subtle);border-top:none;border-radius:0 0 12px 12px;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.model-card{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:10px;padding:12px;transition:all .2s;cursor:pointer}
.model-card:hover{border-color:var(--border-glow);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.mc-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mc-name{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-id{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.mc-status{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;display:flex;align-items:center;gap:4px}
.mc-status.ok{background:rgba(16,185,129,.15);color:var(--accent-green)}
.mc-status.err{background:rgba(239,68,68,.15);color:var(--accent-red)}
.mc-status.pending{background:rgba(245,158,11,.15);color:var(--accent-orange)}
.mc-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.mc-actions{display:flex;gap:4px;margin-left:auto}
.mc-action{width:22px;height:22px;display:grid;place-items:center;border-radius:5px;color:var(--text-muted);transition:all .2s}
.mc-action:hover{background:var(--bg-hover);color:var(--text-primary)}
.mc-action.del:hover{background:rgba(239,68,68,.15);color:var(--accent-red)}
.add-model-card{background:transparent;border:1.5px dashed var(--border-strong);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-muted);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;min-height:70px}
.add-model-card:hover{border-color:var(--accent-cyan);color:var(--accent-cyan);background:var(--bg-active)}
.settings-grid{display:grid;grid-template-columns:200px 1fr;gap:24px}
.settings-nav{display:flex;flex-direction:column;gap:2px;position:sticky;top:0}
.settings-nav .nav-item{justify-content:flex-start}
.settings-section{margin-bottom:28px}
.settings-section-title{font-size:16px;font-weight:700;margin-bottom:4px}
.settings-section-desc{font-size:12.5px;color:var(--text-muted);margin-bottom:14px;line-height:1.6}
.setting-row{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border-subtle)}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1;min-width:0}
.setting-label{font-size:13.5px;font-weight:600;margin-bottom:2px}
.setting-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
.setting-control{flex-shrink:0}
.switch{position:relative;width:42px;height:24px;background:var(--bg-input);border:1px solid var(--border-strong);border-radius:14px;transition:all .2s;cursor:pointer;flex-shrink:0}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;background:var(--text-secondary);border-radius:50%;transition:all .25s var(--ease-out)}
.switch.on{background:var(--accent-cyan);border-color:var(--accent-cyan)}
.switch.on::after{left:20px;background:#0a0a0f;box-shadow:0 0 8px rgba(0,229,255,.4)}
.select{padding:7px 28px 7px 12px;background:var(--bg-input);border:1px solid var(--border-strong);border-radius:7px;font-size:12.5px;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 8px center;min-width:120px}
.text-input{padding:8px 12px;background:var(--bg-input);border:1px solid var(--border-strong);border-radius:7px;font-size:13px;min-width:240px;transition:all .2s}
.text-input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.theme-picker{display:flex;gap:8px}
.theme-opt{width:54px;height:54px;border-radius:11px;border:2px solid var(--border-strong);cursor:pointer;transition:all .2s}
.theme-opt:hover{transform:scale(1.05)}
.theme-opt.active{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,229,255,.2)}
.theme-opt.dark{background:linear-gradient(135deg,#0a0a0f 50%,#1a1a2e 50%)}
.theme-opt.light{background:linear-gradient(135deg,#fafafb 50%,#f1f1f4 50%)}
.theme-opt.auto{background:linear-gradient(90deg,#0a0a0f 0 50%,#fafafb 50% 100%)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:18px;padding:24px;max-width:480px;width:90%;box-shadow:var(--shadow-lg);animation:modalIn .25s var(--ease-out)}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-h{font-size:18px;font-weight:700;margin-bottom:6px}
.modal-d{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6}
.form-field{margin-bottom:14px}
.form-label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;color:var(--text-secondary)}
.form-input{width:100%;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border-strong);border-radius:8px;font-size:13px;transition:all .2s}
.form-input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.form-textarea{min-height:80px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:12.5px}
.form-tip{font-size:11.5px;color:var(--text-muted);margin-top:5px;line-height:1.5;opacity:.85}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;min-width:240px;max-width:340px;box-shadow:var(--shadow-lg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);animation:toastIn .3s var(--ease-out);pointer-events:auto;font-size:13px}
.toast.ok{border-left:3px solid var(--accent-green)}
.toast.err{border-left:3px solid var(--accent-red)}
.toast.info{border-left:3px solid var(--accent-cyan)}
.toast .ic{width:18px;height:18px;flex-shrink:0}
.toast.ok .ic{color:var(--accent-green)}
.toast.err .ic{color:var(--accent-red)}
.toast.info .ic{color:var(--accent-cyan)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.fadeout{animation:toastOut .2s forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}
@media (max-width:1100px){.stats-row{grid-template-columns:repeat(2,1fr)}.profile-grid{grid-template-columns:repeat(2,1fr)}.chart-row{grid-template-columns:1fr}}
@media (max-width:860px){:root{--sidebar-w:0px}.app{grid-template-columns:1fr}.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:260px;transform:translateX(-100%);transition:transform .3s var(--ease-out);z-index:50;box-shadow:var(--shadow-lg)}.sidebar.open{transform:translateX(0)}.brand{min-width:auto;border-right:none;padding-right:0}.topbar-center{display:none}.problem-pill{display:none !important}.settings-grid{grid-template-columns:1fr}.settings-nav{flex-direction:row;overflow-x:auto;position:static;padding-bottom:8px}.settings-nav .nav-item{white-space:nowrap}.suggest-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.profile-grid{grid-template-columns:1fr}.wrong-view,.profile-view,.models-view,.settings-view{padding:18px}}
@media (max-width:520px){.stats-row{grid-template-columns:1fr}.topbar-actions{min-width:auto;border-left:none;padding-left:0}.model-picker{flex:0 0 200px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">WA</div>
      <div class="brand-name"><em>WA</em> 错题本</div>
      <span class="brand-tag">v0.1.0</span>
      <button class="icon-btn" id="sidebarToggle" title="折叠侧边栏" style="display:none" data-collapsed="0">
        <span class="ic-pin">◀</span>
      </button>
    </div>
    <div class="topbar-center">
      <div class="model-picker">
        <button class="model-btn" id="modelBtn" aria-expanded="false">
          <span class="dot"></span>
          <span class="label" id="modelLabel">选择模型…</span>
          <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="model-menu" id="modelMenu"></div>
      </div>
      <div class="search-input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="搜索错题、题目或知识…" id="globalSearch">
      </div>
      <div class="problem-pill" id="problemBar" style="display:none" title="当前对话关联的题目">
        <span class="pp-tag" id="pbPlatform">—</span>
        <span class="pp-id" id="pbId">未关联</span>
        <span class="pp-actions">
          <a class="pp-link" id="pbLink" href="#" target="_blank" rel="noopener" style="display:none" title="打开题目链接"></a>
          <button class="pp-btn" id="pbEdit" title="编辑题目信息">i</button>
          <button class="pp-btn ghost" id="pbAI" title="让 AI 从对话中自动提取">AI</button>
        </span>
        <span class="pp-code" id="pbCode">· 无代码</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="themeToggle" title="主题">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" data-view="settings" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>
  <aside class="sidebar" id="sidebar">
    <div class="sb-section"><span>导航</span><button class="new-btn" id="newChat" title="新建对话"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
    <nav class="nav">
      <div class="nav-item active" data-view="chat"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>AI 对话</span></div>
      <div class="nav-item" data-view="wrong"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>错题总结</span><span class="count">12</span></div>
      <div class="nav-item" data-view="profile"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>学习画像</span></div>
      <div class="nav-item" data-view="models"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="3" y1="9" x2="9" y2="9"/><line x1="15" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="9" y2="15"/><line x1="15" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="9"/><line x1="15" y1="3" x2="15" y2="9"/><line x1="9" y1="15" x2="9" y2="21"/><line x1="15" y1="15" x2="15" y2="21"/></svg><span>模型广场</span></div>
      <div class="nav-item" data-view="settings"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg><span>设置</span></div>
    </nav>
    <div class="sb-section"><span>历史对话</span><button class="new-btn" id="clearHistoryBtn" title="清空历史"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>
    <div class="history" id="historyList"></div>
    <div class="sb-footer">
      <button class="user-card" id="userCard">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info"><div class="user-name" id="userName">OIer_wa</div><div class="user-plan">本地版 · 数据仅本机</div></div>
        <svg class="user-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </aside>
  <main class="main">
    <section class="view active" data-view="chat">
      <div class="chat" id="chatView">
        <div class="chat-welcome" id="chatWelcome">
          <div class="welcome-logo">WA</div>
          <h1 class="welcome-title">让每一次错误都有价值</h1>
          <p class="welcome-sub">基于 OI/ACM 提交记录的 AI 智能错题分析与学习画像平台。从错误中提炼知识盲点，构建个性化复习路径。</p>
          <div class="suggest-grid">
            <div class="suggest-card" data-prompt="帮我分析一道图论最短路 WA 的题目，我用 Dijkstra 但 TLE 了。">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <div class="ti">为什么我的 Dijkstra TLE 了？</div>
              <div class="de">从代码和时间复杂度两个角度分析常见误区</div>
            </div>
            <div class="suggest-card" data-prompt="设计一道动态规划题，状态转移方程应该怎么想？请给出方法论。">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              <div class="ti">DP 状态设计方法论</div>
              <div class="de">从问题分解到状态定义的完整思考链</div>
            </div>
            <div class="suggest-card" data-prompt="生成我最近 7 天的错题总结报告，突出反复出错的知识点。">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <div class="ti">生成本周错题总结</div>
              <div class="de">AI 自动归类、归纳错误模式、给出复习建议</div>

function init() {
  bindNav();
  bindTopbar();
  bindComposer();
  bindModelPicker();
  bindGlobalEvents();
  trySyncFromServer();
  renderWrong();
  renderProfile();
  renderModels();
  renderSettings();
  // 恢复 activeConvId：如果 localStorage 有但对话已删除，清除
  const list = loadConversations();
  if (activeConvId) {
    const c = list.find(x => x.id === activeConvId);
    if (!c) {
      setActiveConv(null);
      state.messages = [];
      localStorage.setItem('wa-messages', '[]');
    } else {
      // 关键：wa-messages 可能落后于 conv.messages（AI 回复后未及时写入）
      // 这里以 conv.messages 为准，覆盖 wa-messages 并刷新 state.messages
      state.messages = (c.messages || []).slice();
      localStorage.setItem('wa-messages', JSON.stringify(state.messages));
    }
  }
  renderHistory();
  const savedName = localStorage.getItem('wa-username');
  if (savedName) {
    document.getElementById('userName').textContent = savedName;
    document.getElementById('userAvatar').textContent = (savedName[0] || 'U').toUpperCase();
  }
  loadModels().then(() => {
    if (!state.currentModel && state.models.length > 0) {
      selectModel(state.models[0].id);
    }
    if (state.messages.length > 0) showChatStream();
    showProblemBadge();
  });
  checkMobile();
  window.addEventListener('resize', checkMobile);
  setTimeout(() => showWelcomeModal(false), 600);
}

function checkMobile() {
  const toggle = document.getElementById('sidebarToggle');
  const toggleTop = document.getElementById('sidebarToggleTop');
  if (window.innerWidth <= 860) {
    toggle.style.display = 'grid';
    if (toggleTop) toggleTop.style.display = 'none';
  } else {
    toggle.style.display = 'none';
    document.getElementById('sidebar').classList.remove('open');
  }
}

/* === NAV === */
function bindNav() {
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.view;
      setView(v);
      if (window.innerWidth <= 860) document.getElementById('sidebar').classList.remove('open');
    });
  });
  document.querySelectorAll('[data-view]').forEach(el => {
    if (el.classList.contains('icon-btn')) {
      el.addEventListener('click', () => setView(el.dataset.view));
    }
  });
  document.getElementById('newChat').addEventListener('click', () => {
    state.messages = [];
    setActiveConv(null);
    localStorage.setItem('wa-messages', '[]');
    showWelcome();
    setView('chat');
    renderHistory();
    showProblemBadge();
    toast('已新建对话', 'ok');
  });
}

function setView(v) {
  state.view = v;
  localStorage.setItem('wa-view', v);
  document.documentElement.setAttribute('data-view', v);
  document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  document.querySelectorAll('.nav-item[data-view]').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  if (v === 'profile') setTimeout(renderProfileChart, 50);
}

/* === TOPBAR === */
function bindTopbar() {
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  // 折叠侧边栏：两个按钮（顶部居中 / 欢迎态隐藏）共用同一个函数
  const toggle = () => {
    if (window.innerWidth <= 860) {
      document.getElementById('sidebar').classList.toggle('open');
      return;
    }
    const app = document.querySelector('.app');
    const collapsed = app.classList.toggle('collapsed');
    localStorage.setItem('wa-sidebar-collapsed', collapsed ? '1' : '0');
    // 同步按钮的图标和 title
    const label = document.querySelector('#sidebarToggle .ic-pin');
    const title = document.getElementById('sidebarToggle');
    const newLabel = collapsed ? '▶' : '◀';
    const newTitle = collapsed ? '展开侧边栏 ▶' : '折叠侧边栏 ◀';
    label.textContent = newLabel;
    title.title = newTitle;
    title.setAttribute('data-collapsed', collapsed ? '1' : '0');
    setTimeout(() => { if (state.profileChart) renderProfileChart(); }, 320);
  };
  document.getElementById('sidebarToggle').addEventListener('click', toggle);
  if (localStorage.getItem('wa-sidebar-collapsed') === '1') {
    const app = document.querySelector('.app');
    app.classList.add('collapsed');
    const label = document.querySelector('#sidebarToggle .ic-pin');
    const title = document.getElementById('sidebarToggle');
    label.textContent = '▶';
    title.title = '展开侧边栏 ▶';
    title.setAttribute('data-collapsed', '1');
  }
  const userCard = document.getElementById('userCard');
  if (userCard) userCard.addEventListener('click', showUserMenu);
  const clearH = document.getElementById('clearHistoryBtn');
  if (clearH) clearH.addEventListener('click', clearAllHistory);
  const pbEdit = document.getElementById('pbEdit');
  if (pbEdit) pbEdit.addEventListener('click', showProblemModal);
  const pbAI = document.getElementById('pbAI');
  if (pbAI) pbAI.addEventListener('click', aiExtractProblem);
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('wa-theme', state.theme);
  document.documentElement.setAttribute('data-theme', state.theme);
  toast(`已切换到${state.theme === 'dark' ? '深色' : '浅色'}主题`, 'info');
  if (state.profileChart) renderProfileChart();
}

    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (open) renderModelMenu();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.model-picker')) {
      menu.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }
  });
}

function renderModelMenu() {
  const menu = document.getElementById('modelMenu');
  const all = [...state.models, ...state.customModels];
  if (all.length === 0) {
    menu.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">暂无可用模型</div>';
    return;
  }
  const groups = {};
  all.forEach(m => {
    const k = m.provider || 'other';
    if (!groups[k]) groups[k] = {name: m.provider_name || k || '其他', models: []};
    groups[k].models.push(m);
  });
  let html = '<div class="mm-search"><input type="text" placeholder="搜索模型…" id="mmSearch"></div>';
  Object.entries(groups).forEach(([k, g]) => {
    html += `<div class="mm-group"><div class="mm-group-title">${g.name}</div>`;
    g.models.forEach(m => {
      const isActive = state.currentModel === m.id;
      html += `<div class="mm-item ${isActive?'active':''}" data-id="${m.id}"><div class="info"><div class="name">${m.name || m.id}</div><div class="id">${m.id}</div></div>${isActive?'<span class="check">'+ICONS.check+'</span>':''}</div>`;
    });
    html += '</div>';
  });
  menu.innerHTML = html;
  menu.querySelectorAll('.mm-item').forEach(el => {
    el.addEventListener('click', () => {
      selectModel(el.dataset.id);
      document.getElementById('modelMenu').classList.remove('open');
      document.getElementById('modelBtn').setAttribute('aria-expanded', 'false');
    });
  });
  const search = menu.querySelector('#mmSearch');
  if (search) {
    search.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      menu.querySelectorAll('.mm-item').forEach(it => {
        const txt = it.textContent.toLowerCase();
        it.style.display = txt.includes(q) ? '' : 'none';
      });
    });
  }
}

function selectModel(id) {
  state.currentModel = id;
  localStorage.setItem('wa-model', id);
  const m = [...state.models, ...state.customModels].find(x => x.id === id);
  const label = document.getElementById('modelLabel');
  if (label) {
    label.textContent = m ? (m.name || m.id) : id;
    console.log('Model selected:', id, 'label:', label.textContent);
  }
}

function updateModelLabel() {
  if (state.currentModel) {
    const m = [...state.models, ...state.customModels].find(x => x.id === state.currentModel);
    document.getElementById('modelLabel').textContent = m ? (m.name || m.id) : state.currentModel;
  } else {
    document.getElementById('modelLabel').textContent = '选择模型…';
  }
}

/* === LOAD MODELS === */
async function loadModels() {
  try {
    const r = await fetch('/api/ai/models');
    const d = await r.json();
    state.models = d.data || [];
    if (!state.currentModel && state.models.length > 0) {
      selectModel(state.models[0].id);
    }
    updateModelLabel();
    renderModelMenu();
    renderModels();
  } catch (e) {
    console.error('load models failed', e);
    state.models = [];
    renderModelMenu();
    renderModels();
  }
}

/* === COMPOSER === */
function bindComposer() {
  const ta = document.getElementById('msgInput');
  const send = document.getElementById('sendBtn');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
  });
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && state.settings.enterSend) {
      e.preventDefault();
      if (state.isGenerating) stopGeneration();
      else sendMessage();
    }
  });
  send.addEventListener('click', () => {
    if (state.isGenerating) stopGeneration();
    else sendMessage();
  });
  document.querySelectorAll('.suggest-card').forEach(el => {
    el.addEventListener('click', () => {
      ta.value = el.dataset.prompt;
      ta.focus();
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });
  const toolBtns = document.querySelectorAll('.composer-actions .tool-btn');
  if (toolBtns[0]) toolBtns[0].addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.txt,.md,.json,.py,.js,.ts,.java,.c,.cpp,.pdf,image/*';
    inp.onchange = () => {
      const f = inp.files[0];
      if (!f) return;
      if (f.size > 5 * 1024 * 1024) { toast('文件超过 5MB', 'err'); return; }
      const r = new FileReader();
      r.onload = ev => {
        const content = String(ev.target.result || '');
        const truncated = content.length > 8000 ? content.slice(0, 8000) + '\n...（已截断）' : content;
        ta.value = `[附件：${f.name}]\n\n${truncated}\n\n`;
        ta.dispatchEvent(new Event('input'));
        ta.focus();
        toast('已添加附件内容', 'ok');
      };
      if (f.type.startsWith('image/')) r.readAsDataURL(f); else r.readAsText(f);
    };
    inp.click();
  });
  if (toolBtns[1]) toolBtns[1].addEventListener('click', () => {
    state.deepThink = !state.deepThink;
    toolBtns[1].classList.toggle('active', state.deepThink);
    toolBtns[1].style.color = state.deepThink ? 'var(--accent-cyan)' : '';
    toolBtns[1].style.background = state.deepThink ? 'var(--bg-hover)' : '';
    toast(state.deepThink ? '已开启深度思考' : '已关闭深度思考', 'info');
  });
  if (toolBtns[2]) toolBtns[2].addEventListener('click', () => {
    state.webSearch = !state.webSearch;
    toolBtns[2].classList.toggle('active', state.webSearch);
    toolBtns[2].style.color = state.webSearch ? 'var(--accent-cyan)' : '';
    toolBtns[2].style.background = state.webSearch ? 'var(--bg-hover)' : '';
    toast(state.webSearch ? '已开启联网搜索' : '已关闭联网搜索', 'info');
  });
}

function setGeneratingUI(on) {
  const send = document.getElementById('sendBtn');

  const icStop = send.querySelector('.ic-stop');
  const ta = document.getElementById('msgInput');

    send.classList.add('stop');

function stopGeneration() {

    state.abortController.abort();

}

function showWelcome() {
  document.getElementById('chatWelcome').style.display = '';
  document.getElementById('chatStream').style.display = 'none';
  document.getElementById('chatInner').innerHTML = '';
  const bar = document.getElementById('problemBar');

function showChatStream() {

  document.getElementById('chatStream').style.display = '';

  inner.innerHTML = '';
  state.messages.forEach(m => inner.appendChild(renderMessage(m)));
  showProblemBadge();
  // 显示侧边栏折叠按钮（仅在打开对话时显示）

function scrollChat() {
  const s = document.getElementById('chatStream');
  if (s) s.scrollTop = s.scrollHeight;
}

function renderMessage(m) {
  const div = document.createElement('div');
  div.className = 'msg ' + (m.role === 'user' ? 'user' : 'ai');
  const av = m.role === 'user' ? 'U' : 'WA';
  const name = m.role === 'user' ? 'You' : (m.model || 'AI');
  // 用户消息也支持 Markdown 渲染（让代码块等可读），但用 sanitize 防止 XSS
  const content = renderMarkdown(m.content || '');
  div.innerHTML = `<div class="msg-avatar">${av}</div><div class="msg-body"><div class="msg-name">${escapeHtml(name)}</div><div class="msg-content">${content}</div><div class="msg-meta"><button title="复制" data-act="copy">${ICONS.copy}</button><button title="重新生成" data-act="regen" style="${m.role==='user'?'display:none':''}">${ICONS.refresh}</button><span class="model-tag">${m.model || '—'}</span></div></div>`;
  if (state.settings.codeHighlight) div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
  if (state.settings.markdown) renderKatexIn(div.querySelector('.msg-content'));
  div.querySelectorAll('[data-act]').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.act === 'copy') {
        navigator.clipboard.writeText(m.content);
        toast('已复制', 'ok');
      } else if (b.dataset.act === 'regen' && !state.isGenerating) {
        regenerate(m);
      }
    });
  });
  return div;
}

function renderMarkdown(text) {
  if (!text) return '';
  try {
    // 1. 用 marked 解析
    let html = marked.parse(text, {breaks: true, gfm: true, headerIds: false, mangle: false});
    // 2. DOMPurify 净化
    if (window.DOMPurify) {
      html = DOMPurify.sanitize(html, {ADD_ATTR: ['target'], USE_PROFILES: {html: true}});
    }
    return html;
  } catch (e) {
    return '<pre>' + escapeHtml(text) + '</pre>';
  }
}

function renderKatexIn(el) {
  if (!el || !window.katex) return;
  const SKIP = new Set(['CODE', 'PRE', 'A', 'SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT']);
  const blockRe = /\$\$([\s\S]+?)\$\$/g;
  const inlineRe = /\$([^\$\n]+?)\$/g;
  // 收集所有需要处理的文本节点
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      if (!n.nodeValue || !/\$/.test(n.nodeValue)) return NodeFilter.FILTER_REJECT;
      let p = n.parentElement;
      while (p && p !== el) {
        if (SKIP.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if (p.classList && (p.classList.contains('katex') || p.classList.contains('katex-display'))) return NodeFilter.FILTER_REJECT;
        p = p.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    const text = node.nodeValue;
    if (!text.includes('$')) continue;
    // 先块级，再行内
    const frag = document.createDocumentFragment();
    let rest = text;
    let last = 0;
    let m;
    blockRe.lastIndex = 0;
    inlineRe.lastIndex = 0;
    // 简易解析：用正则找所有 $...$ 和 $$...$$ 起始
    const matches = [];
    let i = 0;
    while (i < rest.length) {
      if (rest[i] === '$' && rest[i+1] === '$') {
        const end = rest.indexOf('$$', i + 2);
        if (end < 0) break;
        matches.push({start: i, end: end + 2, mode: 'block', tex: rest.slice(i+2, end)});
        i = end + 2;
      } else if (rest[i] === '$') {
        const end = rest.indexOf('$', i + 1);
        if (end < 0) break;
        const tex = rest.slice(i+1, end);
        if (!tex.includes('\n')) matches.push({start: i, end: end + 1, mode: 'inline', tex});
        i = end + 1;
      } else i++;
    }
    if (matches.length === 0) continue;
    for (const mm of matches) {
      if (mm.start > last) frag.appendChild(document.createTextNode(rest.slice(last, mm.start)));
      const span = document.createElement(mm.mode === 'block' ? 'div' : 'span');
      span.className = 'katex-host';
      try {
        span.innerHTML = window.katex.renderToString(mm.tex, {displayMode: mm.mode === 'block', throwOnError: false});
      } catch (e) {
        frag.appendChild(document.createTextNode(rest.slice(mm.start, mm.end)));
        last = mm.end;
        continue;
      }
      frag.appendChild(span);
      last = mm.end;
    }
    if (last < rest.length) frag.appendChild(document.createTextNode(rest.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function sendMessage() {
  const ta = document.getElementById('msgInput');
  const text = ta.value.trim();
  if (!text || state.isGenerating) return;
  if (!state.currentModel) {
    toast('请先选择一个模型', 'err');
    document.getElementById('modelBtn').focus();
    return;
  }
  const isFirstUser = state.messages.filter(m => m.role === 'user').length === 0;
  const userMsg = {role:'user', content:text};
  state.messages.push(userMsg);
  localStorage.setItem('wa-messages', JSON.stringify(state.messages));
  showChatStream();
  appendMessage(userMsg);
  commitConversation();
  ta.value = '';
  ta.style.height = 'auto';
  ta.disabled = true;
  try {
    await callAI();
  } finally {
    ta.disabled = false;
    setTimeout(() => ta.focus(), 50);
  }
  commitConversation();
  showProblemBadge();
  // 首次问答后自动让 AI 命名
  if (isFirstUser) aiTitleConversation(false);
}

async function regenerate(m) {
  const idx = state.messages.findIndex(x => x === m);
  if (idx < 0) return;
  const userMsg = state.messages[idx - 1];
  if (!userMsg || userMsg.role !== 'user') return;
  state.messages = state.messages.slice(0, idx);
  localStorage.setItem('wa-messages', JSON.stringify(state.messages));
  showChatStream();
  await callAI();
}

async function appendMessage(m) {
  const inner = document.getElementById('chatInner');
  inner.appendChild(renderMessage(m));
  scrollChat();
}

/* === HISTORY === */
const HISTORY_KEY = 'wa-conversations-v1';
const ACTIVE_KEY = 'wa-active-conv';
let activeConvId = localStorage.getItem(ACTIVE_KEY) || null;

function loadConversations() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch (e) { return []; }
}

// 启动时尝试从 userdata 拉取一次（用于后端保存了但本地是空的场景）
async function trySyncFromServer() {
  try {
    const r = await fetch('/api/userdata/conversations.json');
    if (!r.ok) return;
    const d = await r.json();
    if (d && Array.isArray(d.items) && d.items.length) {
      const local = loadConversations();
      if (local.length === 0) {
        saveConversations(d.items);
        renderHistory();
      }
    }
  } catch (e) {}
}

function saveConversations(list) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  // 关键：wa-messages 始终是「当前活动 conv」的消息缓存，与 conv.messages 保持一致
  if (activeConvId) {
    const c = list.find(x => x.id === activeConvId);
    if (c) {
      state.messages = c.messages.slice();
      localStorage.setItem('wa-messages', JSON.stringify(state.messages));
    }
  }
}

function newConversationId() {
  return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

function setActiveConv(id) {
  activeConvId = id;
  if (id) localStorage.setItem(ACTIVE_KEY, id);
  else localStorage.removeItem(ACTIVE_KEY);
}

function commitConversation() {
  if (!state.messages || state.messages.length === 0) return;
  if (!activeConvId) setActiveConv(newConversationId());
  const list = loadConversations();
  const firstUser = state.messages.find(m => m.role === 'user');
  const title = firstUser ? (firstUser.content || '').slice(0, 28).replace(/\n/g, ' ') : '新对话';
  const idx = list.findIndex(c => c.id === activeConvId);
  const existing = idx >= 0 ? list[idx] : {};
  // 保留旧字段：problem / aiTitled / customTitle
  const conv = Object.assign({}, existing, {
    id: activeConvId,
    title: existing.title && existing.aiTitled ? existing.title : (title || '新对话'),
    ts: Date.now(),
    messages: state.messages.slice(-60),
  });
  if (idx >= 0) list[idx] = conv; else list.unshift(conv);
  if (list.length > 50) list.length = 50;
  saveConversations(list);
  renderHistory();
  // 后台同步到 userdata/（静默失败）
  fetch('/api/userdata/conversations.json', {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({items: list}),
  }).catch(() => {});
}

function aiTitleConversation(force) {
  if (!activeConvId) return;
  const list = loadConversations();
  const idx = list.findIndex(c => c.id === activeConvId);
  if (idx < 0) return;
  const conv = list[idx];
  // 已经有人工/AI 命名（标题不是默认的“新对话”或前 28 字 user 输入），除非强制，否则不重新生成
  if (!force && conv.aiTitled) return;
  const userMsgs = state.messages.filter(m => m.role === 'user');
  if (userMsgs.length === 0) return;
  const excerpt = state.messages.slice(0, 4).map(m => `${m.role==='user'?'U':'A'}: ${(m.content||'').slice(0, 120)}`).join('\n');
  const prompt = `请根据以下对话前几轮内容，生成一个不超过 14 个字的简洁中文标题（不要加引号、不要加标点）：\n\n${excerpt}\n\n只输出标题本身。`;
  // 用当前模型快速生成（不显示流式）
  fetch('/api/ai/chat/completions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({model: state.currentModel, messages: [{role:'user', content: prompt}], stream: false, max_tokens: 60}),
  }).then(r => r.ok ? r.json() : null).then(d => {
    let t = d?.choices?.[0]?.message?.content?.trim();
    if (!t) return;
    t = t.replace(/^["'`\s]+|["'`\s]+$/g, '').replace(/[。!?！？,，.、:：]+$/g, '').slice(0, 16);
    if (!t) return;
    const li = loadConversations();
    const i = li.findIndex(c => c.id === activeConvId);
    if (i < 0) return;
    li[i].title = t;
    li[i].aiTitled = true;
    saveConversations(li);
    renderHistory();
    toast('已自动命名对话', 'ok');
  }).catch(() => {});
}

function clearAllHistory() {
  const list = loadConversations();
  if (list.length === 0) { toast('历史已经是空的', 'info'); return; }
  if (!confirm(`确定要清空全部 ${list.length} 条历史对话吗？此操作不可恢复。`)) return;
  localStorage.removeItem(HISTORY_KEY);
  setActiveConv(null);
  state.messages = [];
  localStorage.setItem('wa-messages', '[]');
  showWelcome();
  setView('chat');
  renderHistory();
  toast('已清空历史', 'ok');
}

function deleteConversation(id) {
  const list = loadConversations().filter(c => c.id !== id);
  saveConversations(list);
  if (id === activeConvId) {
    setActiveConv(null);
    state.messages = [];
    localStorage.setItem('wa-messages', '[]');
    showWelcome();
    setView('chat');
  }
  renderHistory();
  toast('已删除', 'ok');
}

function loadConversation(id) {
  const list = loadConversations();
  const c = list.find(x => x.id === id);
  if (!c) return;
  setActiveConv(id);
  state.messages = c.messages.slice();
  localStorage.setItem('wa-messages', JSON.stringify(state.messages));
  if (state.messages.length > 0) showChatStream(); else showWelcome();
  setView('chat');
  renderHistory();
  showProblemBadge();
}

function renderHistory() {
  const root = document.getElementById('historyList');
  if (!root) return;
  const list = loadConversations();
  if (list.length === 0) {
    root.innerHTML = '<div class="history-empty"><div class="em-ic">💬</div>暂无历史对话<br>开始一段新对话吧</div>';
    return;
  }
  const now = Date.now();
  const groups = {今天: [], 昨天: [], 本周: [], 更早: []};
  list.forEach(c => {
    const diff = (now - c.ts) / 1000 / 60 / 60 / 24;
    if (diff < 1) groups['今天'].push(c);
    else if (diff < 2) groups['昨天'].push(c);
    else if (diff < 7) groups['本周'].push(c);
    else groups['更早'].push(c);
  });
  let html = '';
  Object.entries(groups).forEach(([k, arr]) => {
    if (arr.length === 0) return;
    html += `<div class="history-day">${k}</div>`;
    arr.forEach(c => {
      const isActive = c.id === activeConvId;
      const fullTitle = c.title || '新对话';
      html += `<div class="history-item ${isActive?'active':''}" data-id="${c.id}" title="${escapeHtml(fullTitle)}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.7"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="title">${escapeHtml(fullTitle)}</span><span class="del" title="删除">×</span></div>`;
    });
  });
  root.innerHTML = html;
  root.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) {
        e.stopPropagation();
        if (confirm('删除这条对话？')) deleteConversation(el.dataset.id);
        return;
      }
      loadConversation(el.dataset.id);
      if (window.innerWidth <= 860) document.getElementById('sidebar').classList.remove('open');
    });
  });
}

/* === PROBLEM INFO === */
function getActiveProblem() {
  if (!activeConvId) return null;
  const list = loadConversations();
  const c = list.find(x => x.id === activeConvId);
  return c ? (c.problem || null) : null;
}

function saveActiveProblem(p) {
  if (!activeConvId) return;
  const list = loadConversations();
  const i = list.findIndex(x => x.id === activeConvId);
  if (i < 0) return;
  if (!p || (!p.platform && !p.id && !p.code && !p.link)) list[i].problem = null;
  else list[i].problem = {platform: p.platform || '', id: p.id || '', code: p.code || '', link: p.link || ''};
  saveConversations(list);
  showProblemBadge();
}

function showProblemBadge() {
  const bar = document.getElementById('problemBar');
  if (!bar) return;
  if (!activeConvId || state.messages.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const p = getActiveProblem() || {};
  document.getElementById('pbPlatform').textContent = p.platform || '-';
  document.getElementById('pbId').textContent = p.id || '未关联';
  const codeEl = document.getElementById('pbCode');
  if (p.code && p.code.trim()) {

    codeEl.textContent = first.length > 12 ? first.slice(0, 12) + '…' : first;
  } else {
    codeEl.textContent = '· 无代码';
  }
  const linkBtn = document.getElementById('pbLink');
  if (linkBtn) {
    if (p.link) {
      linkBtn.style.display = '';
      linkBtn.href = p.link;
    } else {
      linkBtn.style.display = 'none';
    }
  }
  bar.title = [p.platform, p.id, p.link].filter(Boolean).join(' · ') || '当前对话关联的题目';
}

function aiExtractProblem() {
  if (!activeConvId) { toast('请先在对话里发题', 'err'); return; }
  if (!state.currentModel) { toast('请先选择模型', 'err'); return; }
  const excerpt = state.messages.slice(0, 8).map(m => `${m.role==='user'?'U':'A'}: ${(m.content||'').slice(0, 400)}`).join('\n');
  const prompt = `从以下 OI/ACM 错题对话中提取信息，按 JSON 输出（必须是合法 JSON，不要加 Markdown 代码块、不要任何解释）：
{
  "platform": "洛谷 | Codeforces | AtCoder | LeetCode | 牛客 | 其他 之一（若未提到则填空串）",
  "id": "题号（标准化形式：洛谷 Pxxxx 大写、CF 保留原样、AtCoder 类似 abc123_a 等、LeetCode 数字+小写连字符）",
  "code": "用户代码原文（如对话中未出现则填空串）",
  "link": "题目链接 URL（对话中没给链接就填空串）"
}
特别注意识别以下用户输入模式：
- "luoguP10001" / "洛谷P10001" / "P10001" → platform=洛谷, id=P10001, link=https://www.luogu.com.cn/problem/P10001
- "CF1234A" / "codeforces 1234A" → platform=Codeforces
- "abc123" / "AtCoder abc123" → platform=AtCoder
- "lc 1" / "LeetCode 1" / "两数之和" → platform=LeetCode

对话内容：
${excerpt}`;
  toast('AI 提取中…', 'info');
  fetch('/api/ai/chat/completions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({model: state.currentModel, messages: [{role:'user', content: prompt}], stream: false}),
  }).then(r => r.ok ? r.json() : Promise.reject(r.status)).then(d => {
    let raw = d?.choices?.[0]?.message?.content?.trim() || '';
    raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/```$/g, '').trim();
    try {
      const obj = JSON.parse(raw);
      const cur = getActiveProblem() || {};
      // 兜底：AI 没识别出平台时，根据 id 模式推断
      let platform = obj.platform || cur.platform || '';
      let id = obj.id || cur.id || '';
      let link = obj.link || cur.link || '';
      if (id) {
        if (!platform) {
          if (/^[Pp]\d/.test(id)) platform = '洛谷';
          else if (/^CF\s?\d/i.test(id) || /^\d{3,4}[A-Z][A-Z]?$/.test(id)) platform = 'Codeforces';
          else if (/^abc|^\d{3,4}$/i.test(id) && /atcoder/i.test(excerpt)) platform = 'AtCoder';
        }
        if (!link) {
          if (platform === '洛谷') link = 'https://www.luogu.com.cn/problem/' + id.toUpperCase();
          else if (platform === 'Codeforces') link = 'https://codeforces.com/problemset/problem/' + id;
          else if (platform === 'LeetCode') link = 'https://leetcode.cn/problems/' + id.toLowerCase().replace(/\s+/g, '-');
        }
      }
      saveActiveProblem({
        platform,
        id,
        code: obj.code || cur.code || '',
        link,
      });
      toast('已提取题目信息', 'ok');
    } catch (e) {
      toast('AI 返回格式错误，请手动填写', 'err');
    }
  }).catch(() => toast('提取失败，请检查后端', 'err'));
}

async function callAI() {
  state.isGenerating = true;
  state.abortController = new AbortController();
  setGeneratingUI(true);
  const inner = document.getElementById('chatInner');
  const aiMsg = {role:'assistant', content:'', model: state.currentModel};
  state.messages.push(aiMsg);
  const aiNode = renderMessage(aiMsg);
  aiNode.id = 'streamingMsg';
  inner.appendChild(aiNode);
  const contentEl = aiNode.querySelector('.msg-content');
  // 显示加载动画
  contentEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  scrollChat();

  // 60秒超时：AI一分钟没回应就判定失败
  let firstByteReceived = false;
  const timeoutMs = 60000;
  const timeoutId = setTimeout(() => {
    if (!firstByteReceived && state.abortController) {
      state.abortController.abort();
      state._timeout = true;
    }
  }, timeoutMs);

  const apiMessages = state.messages
    .slice(0, -1)
    .filter(m => m && m.content && m.content.trim() && !m._error && !m._empty && !m._stopped)
    .map(m => ({role: m.role, content: m.content}));

  if (state.settings.systemPrompt && state.settings.systemPrompt.trim()) {
    apiMessages.unshift({role: 'system', content: state.settings.systemPrompt.trim()});
  }
  const useStream = state.settings.stream !== false;

  try {
    if (useStream) {
      const r = await fetch('/api/ai/chat/completions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Accept': 'text/event-stream'},
        body: JSON.stringify({model: state.currentModel, messages: apiMessages, stream: true}),
        signal: state.abortController.signal,
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      firstByteReceived = true;
      clearTimeout(timeoutId);
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const obj = JSON.parse(data);
            const delta = obj.choices?.[0]?.delta?.content
              || obj.choices?.[0]?.message?.content
              || obj.content
              || '';
            if (delta) {
              aiMsg.content += delta;
              contentEl.innerHTML = renderMarkdown(aiMsg.content);
              if (state.settings.codeHighlight) contentEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
              if (state.settings.markdown) renderKatexIn(contentEl);
              scrollChat();
            }
          } catch (e) { /* ignore parse errors */ }
        }
      }
    } else {
      const r = await fetch('/api/ai/chat/completions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({model: state.currentModel, messages: apiMessages, stream: false}),
        signal: state.abortController.signal,
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      firstByteReceived = true;
      clearTimeout(timeoutId);
      const d = await r.json();
      aiMsg.content = d.choices?.[0]?.message?.content || '（无响应）';
      contentEl.innerHTML = renderMarkdown(aiMsg.content);
      if (state.settings.codeHighlight) contentEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    }
    if (!aiMsg.content || !aiMsg.content.trim()) {
      aiMsg.content = '（无响应）';
      aiMsg._empty = true;
    }
    if (state.settings.saveHistory) localStorage.setItem('wa-messages', JSON.stringify(state.messages));
    commitConversation();
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') {
      if (state._timeout) {
        state._timeout = false;
        aiMsg.content = `**AI响应失败**：请求超时（1分钟未收到响应）。\n\n可能原因：网络波动、模型服务繁忙或反代链路不稳定。请稍后重试，或切换到其他模型。`;
        aiMsg._error = true;
        contentEl.innerHTML = renderMarkdown(aiMsg.content);
        toast('请求超时', 'err');
      } else {
        // 用户主动停止：保留已输出内容，底部加灰色提示
        const stoppedHtml = aiMsg.content
          ? renderMarkdown(aiMsg.content)
          : '<div class="loading-dots"><span></span><span></span><span></span></div>';
        contentEl.innerHTML = stoppedHtml + '<div style="color:var(--text-muted);font-size:12px;margin-top:8px;opacity:.7">用户已经停止AI回答</div>';
        aiMsg._stopped = true;
      }
    } else {
      aiMsg.content = `**调用失败**：${e.message}\n\n请检查后端服务是否启动，或切换到其他模型。`;
      aiMsg._error = true;
      contentEl.innerHTML = renderMarkdown(aiMsg.content);
      toast('请求失败', 'err');
    }
    if (state.settings.saveHistory) localStorage.setItem('wa-messages', JSON.stringify(state.messages));
    commitConversation();
  } finally {
    clearTimeout(timeoutId);
    state._timeout = false;
    state.isGenerating = false;
    state.abortController = null;
    setGeneratingUI(false);
  }
}

function renderProfileChart() {
  const chatEl = document.getElementById('chatChart');
  const errEl = document.getElementById('errorChart');
  if (!chatEl || !errEl) return;
  const text = state.theme === 'dark' ? '#a1a1aa' : '#4b5563';
  const grid = state.theme === 'dark' ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)';
  if (state.profileChart) state.profileChart.destroy();
  if (state.errChart) state.errChart.destroy();
  const labels = Array.from({length: 30}, (_,i) => `${i+1}`);
  const ac = labels.map(() => Math.floor(Math.random()*8+1));
  const wa = labels.map(() => Math.floor(Math.random()*5));
  state.profileChart = new Chart(chatEl, {
    type:'bar',
    data:{labels, datasets:[
      {label:'AC', data:ac, backgroundColor:'rgba(16,185,129,.7)', borderRadius:3, stack:'s'},
      {label:'WA', data:wa, backgroundColor:'rgba(239,68,68,.7)', borderRadius:3, stack:'s'},
    ]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{stacked:true, ticks:{color:text, font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:8}, grid:{display:false}}, y:{stacked:true, ticks:{color:text, font:{size:10}}, grid:{color:grid, drawBorder:false}}}}
  });
  state.errChart = new Chart(errEl, {
    type:'doughnut',
    data:{labels:['WA','TLE','RE','MLE','CE'], datasets:[{data:[6,3,2,1,1], backgroundColor:['#ef4444','#f59e0b','#a855f7','#ec4899','#6b7280'], borderWidth:0}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{legend:{position:'right', labels:{color:text, font:{size:11}, padding:8, boxWidth:10}}}}
  });
}
